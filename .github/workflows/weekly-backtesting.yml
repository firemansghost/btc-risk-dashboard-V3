# Weekly: (1) descriptive backtesting report, (2) official monthly SSOT strategy comparison JSON.
# Both commit to public/data/ — same inputs as local npm scripts; provenance in JSON metadata.
name: Weekly Backtesting

on:
  workflow_dispatch:
  schedule:
    # Every Sunday at 11:30 UTC (30 minutes after daily ETL)
    - cron: "30 11 * * 0"

permissions:
  contents: write

concurrency:
  group: weekly-backtesting
  cancel-in-progress: false

jobs:
  weekly-backtesting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci --ignore-scripts --no-audit --fund=false

      - name: Run Weekly Backtesting
        run: npm run etl:backtesting
        env:
          NODE_ENV: production

      - name: Monthly SSOT strategy comparison
        run: npm run etl:strategy-comparison
        env:
          NODE_ENV: production

      - name: Configure git
        run: |
          git config user.name "ghostgauge-bot"
          git config user.email "bot@ghostgauge.local"

      - name: Commit weekly + monthly SSOT artifacts
        run: |
          git add public/data/weekly_backtesting_report.json public/data/dca_vs_risk_comparison.json
          if git diff --cached --quiet; then
            echo "No weekly backtesting or monthly SSOT comparison changes to commit"
            exit 0
          fi
          git commit -m "chore(etl): weekly backtesting + monthly SSOT strategy comparison [skip ci]"
          git push

      - name: Generate Summary
        run: |
          echo "## Weekly pipelines: backtesting + monthly SSOT comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Completed: \`npm run etl:backtesting\` and \`npm run etl:strategy-comparison\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts (if changed):**" >> $GITHUB_STEP_SUMMARY
          echo "- \`public/data/weekly_backtesting_report.json\` — supporting / monitoring (weekly sim)" >> $GITHUB_STEP_SUMMARY
          echo "- \`public/data/dca_vs_risk_comparison.json\` — **official monthly SSOT** Baseline vs Risk-Based DCA" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next run:** Next Sunday 11:30 UTC (after daily ETL)." >> $GITHUB_STEP_SUMMARY
